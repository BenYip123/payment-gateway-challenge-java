name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Start bank simulator
        run: docker-compose up -d bank_simulator

      - name: Build and test
        run: ./gradlew test

      - name: Stop simulator
        run: docker-compose down
